name: Update AI trends

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. These are Beijing time 08:10, 09:10 and 12:10.
    # Extra runs are intentional because scheduled workflows can be delayed or skipped.
    - cron: "10 0 * * *"
    - cron: "10 1 * * *"
    - cron: "10 4 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update trend data
        shell: pwsh
        run: ./scripts/update-trends.ps1 -Limit 12

      - name: Build static pages
        run: node scripts/build-standalone.js

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends.json data/trends.js data/history.json index.html ai-trends-standalone.html ai-trends-redesign-v2.html
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No changes to commit."
            exit 0
          }
          git commit -m "Update AI trends"
          git push
