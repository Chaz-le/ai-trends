name: Update and deploy AI trends

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 08:10 自动更新。GitHub Actions 使用 UTC 时间。
    - cron: "10 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: windows-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update trend data
        shell: pwsh
        run: ./scripts/update-trends.ps1 -Limit 12

      - name: Build static pages
        run: node scripts/build-standalone.js

      - name: Commit updated data
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trends.json data/trends.js data/history.json index.html ai-trends-standalone.html ai-trends-redesign-v2.html
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Output "No changes to commit."
          } else {
            git commit -m "Update AI trends"
            git push
          }

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
